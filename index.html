<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <style>
        .error {
            color: red;
            font-size: 14px;
        }
        .success {
            color: green;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>

<body class="flex justify-center items-center min-h-screen bg-gray-100">

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

<h2 class="text-2xl text-center font-bold mb-6">Registration Form</h2>

<form id="form">

    <!-- Name -->
    <label class="font-medium">Name</label>
    <input type="text" id="name" placeholder="Enter Name"
    class="p-2 border border-gray-300 rounded-xl focus:outline-none w-full mt-2">
    <div id="nameError" class="error"></div>

    <!-- Email -->
    <label class="font-medium mt-4 block">Email</label>
    <input type="text" id="email" placeholder="Enter Email"
    class="p-2 border border-gray-300 rounded-xl focus:outline-none w-full mt-2">
    <div id="emailError" class="error"></div>

    <!-- Password -->
    <label class="font-medium mt-4 block">Password</label>
    <input type="password" id="password" placeholder="Enter Password"
    class="p-2 border border-gray-300 rounded-xl focus:outline-none w-full mt-2">
    <div id="passwordError" class="error"></div>

    <!-- Button -->
    <div class="flex justify-center mt-6">
        <button type="submit" id="submitBtn" disabled
        class="bg-blue-500 text-white px-6 py-2 rounded-xl hover:bg-blue-700 transition">
        Submit
        </button>
    </div>

</form>

<div id="successMessage" class="success mt-4"></div>

</div>

<script>

var nameInput = document.getElementById("name")
var emailInput = document.getElementById("email")
var passwordInput = document.getElementById("password")
var submitBtn = document.getElementById("submitBtn")

var nameError = document.getElementById("nameError")
var emailError = document.getElementById("emailError")
var passwordError = document.getElementById("passwordError")

function validateForm() {

    var isValid = true

    // Name validation
    if (nameInput.value.trim() === "") {
        nameError.textContent = "Name cannot be empty"
        isValid = false
    } else {
        nameError.textContent = ""
    }

    // Email validation
    var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/

    if (!emailPattern.test(emailInput.value)) {
        emailError.textContent = "Enter a valid email address"
        isValid = false
    } else {
        emailError.textContent = ""
    }

    // Password validation
    if (passwordInput.value.length < 6) {
        passwordError.textContent = "Password must be at least 6 characters"
        isValid = false
    } else {
        passwordError.textContent = ""
    }

    submitBtn.disabled = !isValid
}

nameInput.addEventListener("input", validateForm)
emailInput.addEventListener("input", validateForm)
passwordInput.addEventListener("input", validateForm)

document.getElementById("form").addEventListener("submit", function(event){

    event.preventDefault() 

    if (!submitBtn.disabled) {
        document.getElementById("successMessage").textContent = "Submitted successfully!"
        this.reset()
        submitBtn.disabled = true
    }

})

</script>

</body>
</html>
