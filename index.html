<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<style>
.error{
color:red;
font-size:14px;
}
.success{
color:green;
font-weight:bold;
text-align:center;
}
</style>

</head>

<body class="flex justify-center items-center min-h-screen bg-gradient-to-r from-blue-100 to-purple-100">

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md">

<h2 class="text-2xl text-center font-bold mb-6">Registration Form</h2>

<form id="form">

<label class="font-medium">Name</label>
<input type="text" id="name" placeholder="Enter Name"
class="w-full p-2 border bg-gray-100 rounded-md mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
<div id="nameError" class="error"></div>


<label class="font-medium mt-4 block">Email</label>
<input type="email" id="email" placeholder="Enter Email"
class="w-full p-2 border bg-gray-100 rounded-md mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
<div id="emailError" class="error"></div>


<label class="font-medium mt-4 block">Password</label>
<input type="password" id="password" placeholder="Enter Password"
class="w-full p-2 border bg-gray-100 rounded-md mt-1 focus:outline-none focus:ring-2 focus:ring-blue-400">
<div id="passwordError" class="error"></div>


<div class="flex justify-center mt-6">
<button type="submit"
class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition">
Submit
</button>
</div>

</form>

<div id="successMessage" class="success mt-4"></div>

</div>

<script>

document.getElementById("form").addEventListener("submit",function(e){

e.preventDefault()

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let password=document.getElementById("password").value

let nameError=document.getElementById("nameError")
let emailError=document.getElementById("emailError")
let passwordError=document.getElementById("passwordError")
let success=document.getElementById("successMessage")

nameError.textContent=""
emailError.textContent=""
passwordError.textContent=""
success.textContent=""

let valid=true

if(name===""){
nameError.textContent="Name is required"
valid=false
}

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/

if(!email.match(emailPattern)){
emailError.textContent="Enter a valid email"
valid=false
}

if(password.length<6){
passwordError.textContent="Password must be at least 6 characters"
valid=false
}

if(valid){
success.textContent="Registration Successful!"
}

})

</script>

</body>
</html>
